<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Appointment Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-indigo-600 p-4 text-white shadow-lg">
        <div class="container mx-auto font-bold text-xl">WhatsApp Reminder System</div>
    </nav>

    <main class="container mx-auto p-6 flex-grow">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                <h2 class="text-xl font-bold mb-4 text-gray-800">New Appointment</h2>
                <form id="appointmentForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Name</label>
                        <input type="text" id="customer_name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-gray-50 p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Phone</label>
                        <input type="tel" id="phone_number" required placeholder="+1234567890" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-gray-50 p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Time</label>
                        <input type="datetime-local" id="appointment_time" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 bg-gray-50 p-2">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded-md hover:bg-indigo-700 transition font-semibold">Book Appointment</button>
                </form>
            </div>

            <div class="md:col-span-2 bg-white p-6 rounded-xl shadow-md border border-gray-100">
                <h2 class="text-xl font-bold mb-4 text-gray-800">Live Schedule</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50 text-gray-500 text-xs uppercase font-medium">
                            <tr>
                                <th class="px-4 py-3 text-left">Customer</th>
                                <th class="px-4 py-3 text-left">Time</th>
                                <th class="px-4 py-3 text-left">Status</th>
                            </tr>
                        </thead>
                        <tbody id="appointmentsTable" class="divide-y divide-gray-200 text-sm text-gray-600"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:8000';
        
        async function loadAppointments() {
            const resp = await fetch(`${API_URL}/appointments`);
            const data = await resp.json();
            const table = document.getElementById('appointmentsTable');
            table.innerHTML = data.map(apt => `
                <tr>
                    <td class="px-4 py-4">${apt.customer_name}</td>
                    <td class="px-4 py-4">${new Date(apt.appointment_time).toLocaleString()}</td>
                    <td class="px-4 py-4">
                        <span class="px-2 py-1 rounded-full text-xs font-semibold ${apt.reminder_sent ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">
                            ${apt.reminder_sent ? 'Reminder Sent' : 'Scheduled'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                customer_name: document.getElementById('customer_name').value,
                phone_number: document.getElementById('phone_number').value,
                appointment_time: document.getElementById('appointment_time').value
            };
            const resp = await fetch(`${API_URL}/appointments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (resp.ok) {
                alert('Appointment Booked!');
                e.target.reset();
                loadAppointments();
            }
        });

        loadAppointments();
        setInterval(loadAppointments, 5000);
    </script>
</body>
</html>
